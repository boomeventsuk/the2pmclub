[build]
  command = "npm run build"
  publish = "dist"

[[edge_functions]]
  path = "/events/*"
  function = "og-inject"

[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "accelerometer=(), autoplay=(), camera=(), clipboard-read=(self), clipboard-write=(self), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()"

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = """
      default-src 'self';
      img-src 'self' data: https://boombastic-events.b-cdn.net https://storage.googleapis.com https://www.facebook.com https://www.googletagmanager.com https://www.google-analytics.com;
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://www.googletagmanager.com;
      font-src https://fonts.gstatic.com;
      script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://www.google-analytics.com https://www.eventbrite.co.uk https://eventbrite.co.uk https://www.eventbrite.com https://eventbrite.com https://connect.facebook.net;
      connect-src 'self' https://www.googletagmanager.com https://www.google-analytics.com https://region1.google-analytics.com https://www.eventbrite.co.uk https://eventbrite.co.uk https://www.eventbrite.com https://eventbrite.com https://connect.facebook.net https://www.facebook.com https://*.facebook.com;
      frame-src https://www.googletagmanager.com https://www.facebook.com https://open.spotify.com https://www.eventbrite.co.uk https://eventbrite.co.uk https://www.eventbrite.com https://eventbrite.com https://www.youtube.com;
      media-src 'self' https://boombastic-events.b-cdn.net;
    """

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/lovable-uploads/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/events/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"