name: Sync Eventbrite Prices

on:
  schedule:
    - cron: '0 8,14 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Sync prices from Eventbrite
        env:
          EVENTBRITE_TOKEN: ${{ secrets.EVENTBRITE_TOKEN }}
        run: node scripts/sync-eventbrite-prices.js

      - name: Commit and push if changed
        run: |
          git diff --quiet public/events.json && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/events.json
          git commit -m "chore: sync Eventbrite prices [automated]"
          git push
