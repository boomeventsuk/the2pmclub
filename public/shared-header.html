<!-- Header JS (hamburger toggle + locations accordion) -->
<script>
(function(){
  var toggle = document.querySelector('.nav-toggle');
  var menu   = document.getElementById('mobile-menu');
  if(!toggle || !menu) return;

  menu.setAttribute('hidden','');
  toggle.setAttribute('aria-expanded','false');

  function setMenu(open){
    if(open){
      document.body.classList.add('nav-open');
      menu.removeAttribute('hidden');
      toggle.setAttribute('aria-expanded','true');
    } else {
      document.body.classList.remove('nav-open');
      menu.setAttribute('hidden','');
      toggle.setAttribute('aria-expanded','false');
    }
  }

  toggle.addEventListener('click', function(){
    setMenu(!document.body.classList.contains('nav-open'));
  });

  menu.addEventListener('click', function(e){
    if(e.target.closest('a')) setMenu(false);
  });

  // Locations accordion
  var locBtn = document.getElementById('locations-toggle');
  var locSub = document.getElementById('locations-sub');
  if(locBtn && locSub){
    locBtn.addEventListener('click', function(){
      locSub.classList.toggle('open');
      var arrow = locBtn.querySelector('span');
      if(arrow) arrow.textContent = locSub.classList.contains('open') ? '▲' : '▼';
    });
  }
})();
</script>
