/* Make external ticket links open in a new tab (safe) */
document.querySelectorAll('#tickets-list a[href^="http"]').forEach(a=>{
  a.target='_blank'; a.rel='noopener';
});

/* Robust hamburger: works if button has .nav-toggle OR aria-label="Menu" */
(function(){
  const toggle = document.querySelector('.nav-toggle') || document.querySelector('[aria-label="Menu"]');
  const menu   = document.getElementById('mobile-menu') || document.querySelector('.mobile-menu');
  if(!toggle || !menu) return;
  // initial state
  menu.setAttribute('hidden','');
  toggle.setAttribute('aria-expanded','false');

  function openMenu(open){
    if(open){
      document.body.classList.add('nav-open');
      menu.removeAttribute('hidden');
      toggle.setAttribute('aria-expanded','true');
    }else{
      document.body.classList.remove('nav-open');
      menu.setAttribute('hidden','');
      toggle.setAttribute('aria-expanded','false');
    }
  }

  toggle.addEventListener('click', ()=>{
    const isOpen = document.body.classList.contains('nav-open');
    openMenu(!isOpen);
  });

  // Close menu on link click (improves UX)
  menu.addEventListener('click', e=>{
    const a = e.target.closest('a');
    if(a) openMenu(false);
  });
})();

// CONFIG: IDs & selectors
const LIST_ID = 'tickets-list';                 // the container that holds all event cards
const CARD_SEL = '[data-ticket-card]';          // each event card wrapper
const DATE_ATTR = 'data-date-iso';              // ISO date attribute on each card
const STATUS_SEL = '[data-status]';             // empty <span> that will read "On sale"
const XMAS_BANNER_SEL = '[data-banner="christmas"]'; // optional banner to show if any Dec events

// 1) Collect cards, remove past events, and sort future ones by date
const todayIso = new Date().toISOString().slice(0,10);
const list = document.getElementById(LIST_ID);
if (list) {
  const cards = Array.from(list.querySelectorAll(CARD_SEL));
  const upcoming = [];
  let hasDecember = false;

  for (const card of cards) {
    const iso = (card.getAttribute(DATE_ATTR) || '').trim();
    if (!iso) continue;                      // ignore cards without a date
    if (iso < todayIso) {                    // hide past
      card.remove();
      continue;
    }
    const d = new Date(iso);
    if (d.getMonth() === 11) hasDecember = true; // December = 11
    upcoming.push({ card, iso });
  }

  // Sort ascending by ISO date
  upcoming.sort((a, b) => a.iso.localeCompare(b.iso));

  // Re-append in order and set default "On sale" status
  for (const { card } of upcoming) {
    const statusEl = card.querySelector(STATUS_SEL);
    if (statusEl && !statusEl.textContent.trim()) statusEl.textContent = 'On sale';
    list.appendChild(card);
  }

  // 2) Toggle Christmas banner if any December shows remain
  const banner = document.querySelector(XMAS_BANNER_SEL);
  if (banner) banner.style.display = hasDecember ? 'block' : 'none';

  // 3) Safety: make all outbound ticket links open in a new tab
  list.querySelectorAll('a[href^="http"]').forEach(a => {
    a.setAttribute('target','_blank');
    a.setAttribute('rel','noopener');
  });
}
</script>
